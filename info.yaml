# Tiny Tapeout project information
project:
  title:        "Synchronous FIFO"         # Project title
  author:       "Diego Maldonado"          # Your name
  discord:      ""                         # Your discord username (optional)
  description:  "8-bit width, 16-word depth Synchronous FIFO" # One line description
  language:     "SystemVerilog" 
  clock_hz:     20000000                   # 20 MHz (equivalente al periodo de 50 ns)

  # How many tiles your design occupies? A single tile is about 160x100 uM.
  tiles: "1x1"          

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_dimaldonadom_fifo"

  # List your project's source files here.
  source_files:
    - "tt_um_dimaldonadom_fifo.v"
    - "fifo.sv"                        # Asegúrate de incluir el core de tu diseño

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs 
  ui[0]: "d_in[0]"
  ui[1]: "d_in[1]"
  ui[2]: "d_in[2]"
  ui[3]: "d_in[3]"
  ui[4]: "d_in[4]"
  ui[5]: "d_in[5]"
  ui[6]: "d_in[6]"
  ui[7]: "d_in[7]"

  # Outputs 
  uo[0]: "d_out[0]"
  uo[1]: "d_out[1]"
  uo[2]: "d_out[2]"
  uo[3]: "d_out[3]"
  uo[4]: "d_out[4]"
  uo[5]: "d_out[5]"
  uo[6]: "d_out[6]"
  uo[7]: "d_out[7]"

  # Bidirectional pins (Usados para las señales de control y banderas)
  uio[0]: "wr_en"      # write enable
  uio[1]: "rd_en"      # read enable
  uio[2]: "full"       # FIFO full flag
  uio[3]: "empty"      # FIFO empty flag
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6